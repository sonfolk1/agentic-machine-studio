name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  desktop:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Type-check renderer
        run: npx tsc --noEmit -p tsconfig.json
      - name: Type-check Electron main
        run: npx tsc -p electron/tsconfig.json
      - name: Tests
        run: npm test
      - name: Vite production build
        run: npm run build:renderer
      - name: Package (dir only, no signing)
        run: npm run package:dir
      - name: Upload .app bundle
        uses: actions/upload-artifact@v4
        with:
          name: agentic-studio-app
          path: release/mac-arm64/Agentic Studio.app
          retention-days: 7
