name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate Xcode project
        run: node scripts/genproj.js

      - name: Build unsigned .ipa
        run: ./build.sh

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: AgenticStudioMobile.ipa
          path: build/AgenticStudioMobile.ipa
          retention-days: 14
